<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, intial-scale=1.0" />
    <title>Hangman Game</title>
    <link rel="stylesheet" href="css_files/main.css" />
  </head>


  <body>
    <div class="container">
      <audio src="audio/fail.mp4" id="fail"></audio>
      <audio src="audio/success.mp4" id="success"></audio>
      <div class="game-info">
        <div class="game-name">Hangman</div>
        <div class="trials">trilas left: <span>8</span></div>
        <div class="category">
          Word From: <span></span>
        </div>
      </div>
      <hr>
      <div class="row">
        <div class="hangman-draw">
          <div class="the-draw hide">
            <div class="the-stand hide"></div>
            <div class="the-hang hide"></div>
            <div class="the-rope hide"></div>
            <div class="the-man">
              <div class="head hide"></div>
              <div class="body hide"></div>
              <div class="hands hide"></div>
              <div class="legs hide"></div>
            </div>
          </div>
        </div>
        <div class="clear"></div>
        <div class="letters"></div>
      </div>
      <hr>
      <div class="letters-guess"></div>
    </div>
    <script src="js_files/js.js"></script>
  </body>

</html>
